label: ppo
algorithm: ppo
# PPO is on-policy and benefits from massively parallel envs — mirrors
# train.py's _default_num_envs_classic.
num_envs: 1024

metric:
  name: "Reward / Total reward (mean)"
  goal: maximize

parameters:
  agent.discount_factor:
    values: [0.1, 0.3, 0.5, 0.7, 0.9, 0.99, 0.999]
  agent.gae_lambda:
    distribution: uniform
    min: 0.9
    max: 1.0
  agent.ratio_clip:
    values: [0.1, 0.2, 0.3]
  agent.entropy_loss_scale:
    values: [0.0, 0.001, 0.01]
  agent.models.policy.backbone:
    # mlp (plain MLP, u = MLP(obs)) | control (CLActor, u = uref + feedback(x-xref))
    values: [mlp, control]
