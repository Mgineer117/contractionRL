label: sac
algorithm: sac
# SAC-like (samples from a large replay buffer) needs far fewer parallel envs
# than PPO — mirrors train.py's _default_num_envs_classic.
num_envs: 64

metric:
  name: "Reward / Total reward (mean)"
  goal: maximize

parameters:
  agent.learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-3
  agent.discount_factor:
    values: [0.9, 0.99, 0.999]
  agent.polyak:
    distribution: log_uniform_values
    min: 1.0e-3
    max: 1.0e-1
  agent.batch_size:
    values: [128, 256, 512, 1024]
  agent.initial_entropy_value:
    distribution: uniform
    min: 0.05
    max: 0.5
