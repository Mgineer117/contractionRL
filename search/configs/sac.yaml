label: sac
algorithm: sac
# SAC-like (samples from a large replay buffer) needs far fewer parallel envs
# than PPO — mirrors train.py's _default_num_envs_classic.
num_envs: 64

metric:
  name: "Reward / Total reward (mean)"
  goal: maximize

parameters:
  agent.learning_rate:
    values: [1.0e-5, 3.0e-5, 1.0e-4, 3.0e-4, 1.0e-3]
  agent.discount_factor:
    values: [0.1, 0.3, 0.5, 0.7, 0.9, 0.99, 0.999]
  agent.polyak:
    values: [0.001, 0.005, 0.01, 0.05, 0.1]
  agent.batch_size:
    values: [128, 256, 512, 1024]
  agent.initial_entropy_value:
    values: [0.05, 0.1, 0.2, 0.3, 0.5]
