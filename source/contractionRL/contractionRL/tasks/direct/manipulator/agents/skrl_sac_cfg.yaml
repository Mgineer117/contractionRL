seed: 42

models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: elu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [256, 256]
        activations: elu
    output: ONE
  critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [256, 256]
        activations: elu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [256, 256]
        activations: elu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [256, 256]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: 4000

agent:
  class: SAC
  gradient_steps: 1
  batch_size: 4096
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: 3.0e-04
  learn_entropy: True
  initial_entropy_value: 0.2
  random_timesteps: 80
  learning_starts: 80
  grad_norm_clip: 1.0
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  experiment:
    directory: "manipulator_sac"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

trainer:
  class: SequentialTrainer
  timesteps: 10000
  environment_info: log
