seed: 42

models:
  separate: True
  policy:
    class: GaussianMixin
    backbone: mlp
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: tanh
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: True
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: tanh
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: PPO
  rollouts: 64        # 1024 envs × 64 = 65K samples per update; 64 steps ≈ 5s covers most vel-tracking episodes
  learning_epochs: 5
  mini_batches: 4     # 1024 envs × 64 = 65K samples; 4 mini-batches ≈ 16K each
  discount_factor: 0.99
  gae_lambda: 0.97
  learning_rate: 3.0e-04
  learning_rate_scheduler: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5
  ratio_clip: 0.2
  value_clip: 0.0
  entropy_loss_scale: 0.0
  value_loss_scale: 1.0
  kl_threshold: 0.03
  time_limit_bootstrap: True
  experiment:
    directory: "humanoid_vel_tracking"
    experiment_name: ""
    write_interval: 1
    checkpoint_interval: 1

trainer:
  class: SequentialTrainer
  timesteps: 30000
  environment_info: log
