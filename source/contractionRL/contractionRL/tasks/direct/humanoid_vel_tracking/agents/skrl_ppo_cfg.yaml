seed: 42
models:
  separate: true
  policy:
    class: GaussianMixin
    backbone: mlp
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128, 128]
        activations: tanh
    output: ACTIONS
  value:
    class: DeterministicMixin
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128, 128]
        activations: tanh
    output: ONE
memory:
  class: RandomMemory
  memory_size: -1
agent:
  class: PPO
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  learning_rate: 0.001
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5
  ratio_clip: 0.2
  value_clip: 0.0
  entropy_loss_scale: 0.01
  value_loss_scale: 0.5
  kl_threshold: 0.016
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: true
  std_dev_annealing: false
  std_dev_annealing_kwargs:
    schedule: exponential
    final_log_std: -4.6
    power: 5.0
  experiment:
    directory: humanoid_vel_tracking
    experiment_name: ''
    write_interval: auto
    checkpoint_interval: auto
  gae_lambda: 0.95
  use_state_norm: false
  use_value_norm: true
trainer:
  class: SequentialTrainer
  timesteps: 50000
  environment_info: log
