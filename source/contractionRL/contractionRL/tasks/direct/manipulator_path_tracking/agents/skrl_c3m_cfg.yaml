seed: 42  # Random seed for reproducibility
models:
  # separate flag is not functionally used for C3M but is present for code compatibility with SKRL internals
  separate: True
  policy:
    class: DeterministicMixin  # Outputs deterministic continuous values
    backbone: contraction
    clip_actions: False  # Clip actions to the environment action space limits
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: tanh
  cmg:
    class: CMG
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: tanh
        constrain_eigenvalues: True
  dynamics:
    class: NeuralDynamics
    network:
      - name: net
        input: STATE_ACTION
        layers: [256, 256]
        activations: relu

memory:
  class: RandomMemory
  memory_size: 131072  # Capacity of the experience replay buffer (-1 means dynamic/infinite)

agent:
  class: C3M
  batch_size: 1024
  learning_rate_scheduler: null  # Optional PyTorch learning rate scheduler (e.g., "StepLR")
  cmg_updates_per_policy_update: 3  # Number of CMG metric updates to perform per policy update
  W_lr: 3.0e-4  # Learning rate for the Contraction Metric Generator (CMG) network
  u_lr: 3.0e-4  # Learning rate for the Policy (Actor) network
  lbd: 0.01  # Contraction rate parameter (lambda) enforcing the exponential stability bound
  eps: 0.01  # Margin parameter (epsilon) ensuring strict definiteness of the metric
  w_ub: 10.0  # Upper bound clipping value for the generated metric M(x)
  w_lb: 0.1  # Lower bound clipping value for the generated metric M(x)
  use_analytical_dynamics: false  # Whether to use exact analytical dynamics (true) or learn NeuralDynamics (false)
  dynamics_lr: 1.0e-3  # Learning rate for the NeuralDynamics network
  dynamics_lr_scheduler: "StepLR"  # Learning rate scheduler for NeuralDynamics
  dynamics_lr_scheduler_kwargs:  # Arguments for the NeuralDynamics scheduler
    step_size: 1  # anneal every epoch
    gamma: 0.99
  dynamics_batch_size: 4096
  dynamics_pretrain_epochs: 100  # Number of epochs for offline data, or number of rollouts for online fallback
  experiment:
    directory: "manipulator_c3m"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name: ~  # auto-generated by train.py (deterministic, matches local log dir)

trainer:
  class: C3MTrainer
  timesteps: 10000  # Total number of environment steps to train for
  eval_interval: 5000  # Frequency of running evaluation rollouts
  environment_info: log  # Type of environment information to record (e.g., log)
