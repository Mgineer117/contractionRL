seed: 42  # Random seed for reproducibility

models:
  separate: False
  policy:
    class: GaussianMixin  # Uses a Gaussian distribution for continuous actions
    backbone: mlp
    clip_actions: False  # Clip actions to the environment action space limits
    clip_log_std: True  # Clip the log standard deviation of the policy distribution
    min_log_std: -20.0  # Lower bound for log standard deviation
    max_log_std: 2.0  # Upper bound for log standard deviation
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: tanh
    output: ACTIONS
  value:
    class: DeterministicMixin  # Outputs deterministic continuous values
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: tanh
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1  # Capacity of the experience replay buffer (-1 means dynamic/infinite)

agent:
  class: PPO
  std_dev_annealing: False
  rollouts: 16        # 1024 envs × 64 = 65K samples per update; 64 steps ≈ 5s covers most vel-tracking episodes
  learning_epochs: 5  # Number of gradient descent passes over the collected batch
  mini_batches: 4     # 1024 envs × 64 = 65K samples; 4 mini-batches ≈ 16K each
  discount_factor: 0.99  # Gamma discount factor weighting future rewards
  gae_lambda: 0.95  # Lambda parameter for Generalized Advantage Estimation (GAE)
  learning_rate: 1.0e-06  # Global step size for neural network optimization
  learning_rate_scheduler: KLAdaptiveLR  # adapts LR to hold per-update KL near kl_threshold — key PPO stabilizer
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  ratio_clip: 0.2  # PPO trust region clipping bound for the objective ratio
  value_clip: 0.0  # Clipping bound for the value function update
  entropy_loss_scale: 0.001  # Coefficient to encourage exploration by maximizing action entropy
  value_loss_scale: 0.5  # Weight coefficient for the value function loss term
  kl_threshold: 0.01  # Early stopping threshold based on Kullback-Leibler divergence
  time_limit_bootstrap: True  # Bootstrap value estimates when episodes end due to time limits
  experiment:
    directory: "quadruped_vel_tracking"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name: ~  # auto-generated by train.py (deterministic, matches local log dir)

trainer:
  class: SequentialTrainer
  timesteps: 300000  # Total number of environment steps to train for
  environment_info: log  # Type of environment information to record (e.g., log)
