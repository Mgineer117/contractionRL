seed: 42

models:
  separate: True
  policy:
    class: GaussianMixin
    backbone: mlp
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: tanh
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    clip_actions: True
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: tanh
    output: ONE
  critic_2:
    class: DeterministicMixin
    clip_actions: True
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: tanh
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: True
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: tanh
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: True
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: tanh
    output: ONE

memory:
  class: RandomMemory
  memory_size: 15000  # per-env capacity; total = memory_size * num_envs

agent:
  class: SAC
  gradient_steps: 1
  batch_size: 512
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: 3.0e-04
  learn_entropy: True
  initial_entropy_value: 0.2
  random_timesteps: 80
  learning_starts: 80
  grad_norm_clip: 1.0
  experiment:
    directory: "quadruped_vel_tracking_sac"
    experiment_name: ""
    write_interval: 1
    checkpoint_interval: 1
    wandb: false
    wandb_kwargs:
      project: contractionRL
      name: ~

trainer:
  class: SequentialTrainer
  timesteps: 2000
  environment_info: log
