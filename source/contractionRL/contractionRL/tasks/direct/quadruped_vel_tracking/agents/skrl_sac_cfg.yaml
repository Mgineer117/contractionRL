seed: 42
models:
  separate: true
  policy:
    class: GaussianMixin
    backbone: mlp-squashed  # tanh-squashed Gaussian (SquashedGaussianActorModel) — required
                        # for SAC on this bounded [-1, 1] action space (no uref here, so this
                        # is a plain squashed MLP); skrl's stock unbounded GaussianMixin +
                        # clip_actions is NOT equivalent (clip never reaches log_prob, so the
                        # entropy-coefficient tuning has no fixed point and diverges — see
                        # models.py's SquashedGaussianActorModel docstring)
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: tanh
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [256, 256]
        activations: tanh
    output: ONE
  critic_2:
    class: DeterministicMixin
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [256, 256]
        activations: tanh
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [256, 256]
        activations: tanh
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [256, 256]
        activations: tanh
    output: ONE
memory:
  class: RandomMemory
  memory_size: 10000
agent:
  class: SAC
  gradient_steps: 6
  batch_size: 512
  discount_factor: 0.999
  polyak: 0.005
  learning_rate: 0.0001
  learn_entropy: true
  initial_entropy_value: 0.2
  random_timesteps: 10000
  learning_starts: 10000
  grad_norm_clip: 1.0
  std_dev_annealing: false
  std_dev_annealing_kwargs:
    schedule: linear
    final_log_std: -2.0
    power: 5.0
  experiment:
    directory: quadruped_vel_tracking_sac
    experiment_name: ''
    write_interval: auto
    checkpoint_interval: auto
    wandb: true
    wandb_kwargs:
      project: contractionRL
      name: ~  # auto-generated by train.py (deterministic, matches local log dir)
  use_state_norm: false
trainer:
  class: SequentialTrainer
  timesteps: 300000
  environment_info: log
