seed: 42  # Random seed for reproducibility

models:
  separate: True
  policy:
    class: GaussianMixin  # Uses a Gaussian distribution for continuous actions
    backbone: mlp  # mlp (default, stock skrl gaussian_model) | control (CLActor — requires obs = [x, xref, uref])
    clip_actions: True  # Clip actions to the environment action space limits
    clip_log_std: True  # Clip the log standard deviation of the policy distribution
    min_log_std: -20.0  # Lower bound for log standard deviation
    max_log_std: 2.0  # Upper bound for log standard deviation
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: tanh
    output: ACTIONS
  critic_1:
    class: DeterministicMixin  # Outputs deterministic continuous values
    clip_actions: True  # Clip actions to the environment action space limits
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: tanh
    output: ONE
  critic_2:
    class: DeterministicMixin  # Outputs deterministic continuous values
    clip_actions: True  # Clip actions to the environment action space limits
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: tanh
    output: ONE
  target_critic_1:
    class: DeterministicMixin  # Outputs deterministic continuous values
    clip_actions: True  # Clip actions to the environment action space limits
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: tanh
    output: ONE
  target_critic_2:
    class: DeterministicMixin  # Outputs deterministic continuous values
    clip_actions: True  # Clip actions to the environment action space limits
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: tanh
    output: ONE

memory:
  class: RandomMemory
  memory_size: 15000  # per-env capacity; total = memory_size * num_envs

agent:
  class: SAC
  state_preprocessor: RunningStandardScaler  # Mechanism for normalizing online states
  state_preprocessor_kwargs: null
  gradient_steps: 8   # UTD~1: gradient_steps * batch_size (512) ~= num_envs (4096) new transitions/timestep
  batch_size: 512
  discount_factor: 0.99  # Gamma discount factor weighting future rewards
  polyak: 0.005
  learning_rate: [3.0e-04, 3.0e-04, 1.0e-04]  # [policy, critic, entropy] — damp entropy lr to reduce runaway risk
  learn_entropy: True
  initial_entropy_value: 0.2
  random_timesteps: 80
  learning_starts: 80
  grad_norm_clip: 1.0  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  # Manual log_std annealing (off by default — SAC's learn_entropy above already
  # auto-tunes exploration; only enable this AS WELL AS setting
  # learn_entropy: False, otherwise the two exploration controls fight).
  std_dev_annealing: False
  std_dev_annealing_kwargs:
    schedule: linear        # linear | exponential | cosine
    final_log_std: -2.0     # target log_std at the end of training
    power: 5.0              # exponential schedule only: progress**power
  experiment:
    directory: "quadruped_vel_tracking_sac"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name: ~

trainer:
  class: SequentialTrainer
  timesteps: 12000  # ~96K total gradient steps (12000*8) — matches PPO's ~93.75K for this task
  environment_info: log  # Type of environment information to record (e.g., log)
