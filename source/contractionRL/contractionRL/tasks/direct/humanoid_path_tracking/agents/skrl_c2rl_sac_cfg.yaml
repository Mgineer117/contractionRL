seed: 42  # Random seed for reproducibility

models:
  separate: True
  con_policy:  # contracting policy (gamma_contracting, near-zero) — trains the CMG's certificate
    class: GaussianMixin
    backbone: control-squashed  # mlp (plain MLP, u = uref + MLP(obs)) | control (CLActor, u = uref + feedback(x-xref))
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: tanh
    output: ACTIONS
  opt_policy:  # optimal policy (gamma_optimal) — the one actually deployed unless con_only
    class: GaussianMixin
    backbone: control-squashed
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: tanh
    output: ACTIONS
  con_critic:  # architecture shared by SAC's critic_1/critic_2 + their target networks
    network:
      - name: net
        layers: [256, 256]
        activations: relu
  opt_critic:
    network:
      - name: net
        layers: [256, 256]
        activations: relu
  cmg:
    class: CMG
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: tanh
        constrain_eigenvalues: True

  dynamics:
    class: NeuralDynamics
    network:
      - name: net
        input: STATE_ACTION
        layers: [256, 256]
        activations: relu

memory:
  class: RandomMemory
  memory_size: 244  # con/opt SAC replay buffer size (rows); total capacity = memory_size * num_envs.
                    # PERSISTENT across epochs (only the PPO variant resets its memory each epoch) —
                    # this is what keeps C2RL-SAC off-policy, like standalone SAC.

agent:
  class: C2RL-SAC
  rollouts: 512  # steps collected per con/opt rollout phase each epoch; MUST match trainer.rollouts
                         # below. NOT a real SAC_CFG field — for SAC the con/opt replay buffer is sized
                         # by memory_size above (persistent), not by rollouts.
  use_state_norm: false  # OFF by default: keeping observations raw makes the CMG contraction loss
                         # (which evaluates con_policy on RAW obs to get K = du/dx — see _compute_cmg_loss)
                         # consistent with how con_policy is actually trained/deployed. If set true, C2RL
                         # now routes con_agent's SAME RunningStandardScaler through the CMG loss so the
                         # certified Jacobian still matches the deployed (normalized-input) controller.
  # SAC shared config (con_policy/opt_policy each get their own SAC sub-agent).
  # Standard robotics SAC defaults (see skrl_sac_cfg.yaml across this repo):
  # batch_size 256, [256,256] ReLU critics, ~1M-transition replay target.
  gradient_steps: 32
  batch_size: 8192
  polyak: 0.005
  learning_rate: 3.0e-4  # shared by policy, critic, and entropy coefficient
  learn_entropy: True
  initial_entropy_value: 0.2
  random_timesteps: 0  # con/opt SAC replay buffer persists across epochs; rewards are recomputed at sample
  learning_starts: 0   # time from the live CMG. Both left at 0 (raise learning_starts for a warm-up).
  grad_norm_clip: 1.0  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  # C2RL-specific
  gamma_contracting: 0.0  # con_policy's discount factor (near-zero: approximates a hard per-step constraint)
  gamma_optimal: 0.99  # opt_policy's discount factor — also what the PathTracking figure's theoretical/
                        # empirical bounds inflate by 1/(1-gamma) with, since opt_policy is deployed unless con_only
  con_only: false  # If true, only con_policy is trained/deployed — no opt_policy at all
  # CMG
  W_lr: 3.0e-4
  w_ub: 10.0
  w_lb: 0.1
  lbd: 0.01
  eps: 0.01
  W_entropy_scaler: 1.0e-3
  cmg_updates_per_iter: 3
  cmg_minibatch_size: 256
  buffer_size: 4096
  # reward = -tracking_scaler*||e||_M^2/std - control_scaler*||u-uref||^2/std,
  # i.e. Q/R exactly like SD-LQR/LQR's Q_scaler/R_scaler (sdlqr.py) — tracking_scaler
  # weights state error under the CURRENT learned metric M(x), control_scaler
  # weights the feedback (action - uref) control effort.
  reward_norm_beta: 0.99  # Moving average momentum for both terms' running-variance normalisation
  tracking_scaler: 1.0  # Q: tracking-error weight
  control_scaler: 0.0  # R: control-effort weight (0 = disabled, matches previous default)
  # Dynamics — learn NeuralDynamics (ẋ = f(x) + B(x)·u) unless
  # --use_analytical_dynamics is passed (classic envs only). Same
  # pretraining + online-refinement mechanism as C3M.
  use_analytical_dynamics: false
  dynamics_lr: 1.0e-3
  dynamics_lr_scheduler: "StepLR"
  dynamics_lr_scheduler_kwargs:
    step_size: 1  # anneal every epoch
    gamma: 0.99
  dynamics_batch_size: 4096
  dynamics_pretrain_epochs: 10000  # offline-data epochs, or online rollouts when no data path
  experiment:
    directory: "humanoid_c2rl_sac"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name: ~  # auto-generated by train.py (deterministic, matches local log dir)

trainer:
  class: C2RLSkrlTrainer
  timesteps: 2000000  # Total number of environment steps to train for
  rollouts: 512  # MUST match trainer.rollouts below (con/opt RandomMemory is sized from this)
