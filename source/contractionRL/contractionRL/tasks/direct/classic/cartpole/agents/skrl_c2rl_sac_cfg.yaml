seed: 42  # Random seed for reproducibility

models:
  separate: true
  # The single deployed policy C2RL trains, on the Mahalanobis reward.
  policy:
    class: GaussianMixin
    backbone: control-squashed  # SAC requires a tanh-squashed backbone (unbounded log_prob diverges)
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    network:
    - name: net
      input: OBSERVATIONS
      layers: [128, 128]
      activations: tanh
    output: ACTIONS
    initial_log_std: 0.0
  critic:  # architecture shared by SAC's critic_1/critic_2 + their target networks
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
  # NeuralDynamics (ẋ = f(x) + B(x)·u) — feeds the online contraction-metric SDP
  # when learning dynamics. Built only when use_empirical_dynamics=true (pass
  # --use_empirical_dynamics); classic envs default to analytical get_f_and_B.
  dynamics:
    class: NeuralDynamics
    network:
    - name: net
      input: STATE_ACTION
      layers: [128, 128]
      activations: tanh
  # A `cmg` (class: CMG) model is always built (see c2rl.py module docstring) —
  # omitted here so ContractionRunner falls back to its default [256, 256]/tanh
  # architecture; add a `cmg:` block above (like classic/car's) to customize it.

memory:
  class: RandomMemory
  memory_size: 100000  # SAC persistent replay buffer (rows); total capacity = memory_size * num_envs

agent:
  class: C2RL-SAC
  # SAC shared config (the single deployed policy's SAC sub-agent).
  gradient_steps: 1
  batch_size: 1024
  polyak: 0.005
  learning_rate: 3.0e-4  # shared by policy, critic, and entropy coefficient
  learn_entropy: true
  initial_entropy_value: 0.2
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  use_state_norm: false  # OFF by default — see c2rl.py module docstring / rl_glue.make_base_rl_cfg
  discount_factor: 0.99  # deployed policy's discount factor (single policy — no con/opt duality)
  # NOTE: the contraction-metric / Mahalanobis-reward config (cmg_method, w_ub,
  # w_lb, lbd, tracking_scaler, control_scaler, cm_eps, cm_solver) lives in the
  # top-level `cm:` block below; the offline CMG synthesis (Phase A, always
  # runs) additionally reads `cmg:`.
  experiment:
    directory: "cartpole_c2rl_sac"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name:    # auto-generated by train.py (deterministic, matches local log dir)

# ── Contraction metric + Mahalanobis reward ────────────────────────────────── #
cm:
  # Mahalanobis reward
  w_ub: 10.0  # Upper eigenvalue bound for the metric M(x)
  w_lb: 0.01  # Lower eigenvalue bound for the metric M(x)
  lbd: 2.0    # Contraction rate λ — used by cmg_method's synthesis loss (CM SDP LMI for
              # "cvstem", CMG Cu/C1 loss for "ccm")
  tracking_scaler: 1.0  # Q: tracking-error weight
  control_scaler: 0.0   # R: control-effort weight (0 = disabled)
  # SDP contraction metric (cm_eps used by both cmg_method paths; cm_solver "cvstem" only)
  cm_eps: 0.1   # Strict-definiteness margin on the contraction LMI
  cm_solver: MOSEK  # cvxpy SDP solver: SCS (default, no license) | CLARABEL (no license, tighter/slower) | MOSEK (commercial license, tightest/fastest — see README.md Installation)
  # cmg_method selects the training pipeline (see c2rl.py module docstring):
  #   "ccm"    — trains the CMG directly via C1/C2 loss minimization
  #             (train_cmg_ccm) — no SDP, so cvstem_r_scaler/
  #             max_lambda_reductions/min_feasibility_rate/cm_data_path below
  #             are unused here.
  #   "cvstem" (default, this config) — Tsukamoto CV-STEM-style: solves one
  #              pointwise SDP per state (ncm_synthesis.solve_cm_metric)
  #              keeping B directly via a Riccati term (R = cvstem_r_scaler·I
  #              below) — the same congruence trick (W = M⁻¹) that convexifies
  #              the Riccati inequality — M(x) doubles as a state-dependent-
  #              Riccati solution, so K(x) = R⁻¹B(x)ᵀM(x) is a ready LQR-style
  #              gain (not wired up here — C2RL only consumes M for the reward):
  #               A(x)·W + W·A(x)ᵀ - 2·B·R⁻¹·Bᵀ + 2λ·W ⪯ -ε·I
  #               w_lb·I ⪯ W ⪯ w_ub·I
  #              (the factor 2 is the closed loop A - B R⁻¹BᵀM carried through the
  #              W = M⁻¹ congruence — it is what makes K above the certified gain.)
  #              Control is penalized via this Riccati term, not bounded over an
  #              action range — see ncm_synthesis.py module docstring.
  cmg_method: cvstem
  cvstem_r_scaler: 0.01  # R = cvstem_r_scaler·I in the BR⁻¹Bᵀ term (mirrors skrl_sdlqr_cfg.yaml's R_scaler); "cvstem" only
  # On SDP infeasibility AT A GIVEN STATE, retry that state alone with λ
  # halved, up to this many times, before giving up on it and dropping it from
  # the dataset — 0 disables this and reverts to dropping immediately. Warns
  # per reduced state + an aggregate summary (build_cm_dataset). "cvstem" only.
  # See ncm_synthesis._solve_cm_metric_with_backoff.
  max_lambda_reductions: 10
  min_feasibility_rate: 0.95  # raise before CMG regression if fewer than 95% of sampled states are feasible; "cvstem" only
  # Cache the synthesized {x, W} CM dataset here (build_cm_dataset's per-state SDP
  # solve is the expensive part of "cvstem" synthesis — 131072 states can take
  # minutes; unused by "ccm", which has no cache). Reused on a later run as long
  # as lbd/w_lb/w_ub/cm_eps/cm_solver/cvstem_r_scaler/cmg_memory_size below all
  # still match too; re-solved and overwritten otherwise. "cvstem" only.
  cm_data_path: "data/classic/cartpole/cm_data.npz"

# ── Offline CMG synthesis (Phase A, always runs before Phase B) ───────────── #
# Sample cmg_memory_size states (uniformly from the classic env's analytic
# state space, or from empirical_dynamics.dynamics_pretrain_data_path when
# set). "cvstem": solve one SDP per state, then MSE-regress the models.cmg
# network onto {x -> W*}. "ccm": train models.cmg directly with C1/C2 losses,
# no SDP. Either way, freeze before Phase B.
cmg:
  cmg_memory_size: 131072
  cmg_regress_epochs: 50
  cmg_regress_lr: 1.0e-3
  cmg_regress_lr_scheduler: "StepLR"  # built the same way as empirical_dynamics' scheduler
  cmg_regress_lr_scheduler_kwargs:
    step_size: 1  # anneal every epoch
    gamma: 0.99
  cmg_regress_batch_size: 1024

# ── Dynamics — analytical env get_f_and_B by default; set use_empirical_dynamics
#    true (classic envs only) to learn a NeuralDynamics instead. ─────────────── #
empirical_dynamics:
  use_empirical_dynamics: false  # false = env analytical get_f_and_B; true = learn NeuralDynamics
  # States×controls for ONLINE dynamics-data generation (use_empirical_dynamics=true
  # with no dynamics_pretrain_data_path): samples ceil(memory_size / N) states and
  # pairs each with N distinct controls → N control-aware samples per state. Only
  # affects NeuralDynamics pretraining; ignored under analytical dynamics. Default 3.
  num_controls_per_state: 3
  dynamics_lr: 1.0e-3
  dynamics_lr_scheduler: "StepLR"
  dynamics_lr_scheduler_kwargs:
    step_size: 1  # anneal every epoch
    gamma: 0.99
  dynamics_batch_size: 4096
  dynamics_pretrain_epochs: 100  # offline-data epochs, or online rollouts when no data path

trainer:
  class: C2RLSkrlTrainer
  timesteps: 30000   # Total number of environment steps to train for
