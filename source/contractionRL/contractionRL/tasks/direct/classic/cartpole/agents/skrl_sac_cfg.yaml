seed: 42  # Random seed for reproducibility

models:
  separate: True
  policy:
    class: GaussianMixin  # Uses a Gaussian distribution for continuous actions
    backbone: mlp
    clip_actions: True  # Clip actions to the environment action space limits
    clip_log_std: True  # Clip the log standard deviation of the policy distribution
    min_log_std: -20.0  # Lower bound for log standard deviation
    max_log_std: 2.0  # Upper bound for log standard deviation
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: relu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin  # Outputs deterministic continuous values
    clip_actions: True  # Clip actions to the environment action space limits
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [256, 256]
        activations: relu
    output: ONE
  critic_2:
    class: DeterministicMixin  # Outputs deterministic continuous values
    clip_actions: True  # Clip actions to the environment action space limits
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [256, 256]
        activations: relu
    output: ONE
  target_critic_1:
    class: DeterministicMixin  # Outputs deterministic continuous values
    clip_actions: True  # Clip actions to the environment action space limits
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [256, 256]
        activations: relu
    output: ONE
  target_critic_2:
    class: DeterministicMixin  # Outputs deterministic continuous values
    clip_actions: True  # Clip actions to the environment action space limits
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [256, 256]
        activations: relu
    output: ONE

memory:
  class: RandomMemory
  memory_size: 250000  # per-env capacity; total = memory_size * num_envs (250000*4≈1,000,000, standard ~1M replay buffer)

agent:
  class: SAC
  state_preprocessor: RunningStandardScaler  # Mechanism for normalizing online states
  state_preprocessor_kwargs: null
  gradient_steps: 1
  batch_size: 256
  discount_factor: 0.99  # Gamma discount factor weighting future rewards
  polyak: 0.005
  learning_rate: 3.0e-04  # policy, critic, and entropy coefficient all share the same lr
  learn_entropy: True
  initial_entropy_value: 0.2
  random_timesteps: 1000
  learning_starts: 1000
  grad_norm_clip: 1.0  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  experiment:
    directory: "car_sac"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name: ~  # auto-generated by train.py (deterministic, matches local log dir)

trainer:
  class: SequentialTrainer
  timesteps: 600000  # Total number of environment steps to train for
  environment_info: log  # Type of environment information to record (e.g., log)
