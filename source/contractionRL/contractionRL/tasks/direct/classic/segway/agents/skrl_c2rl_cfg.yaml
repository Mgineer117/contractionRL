seed: 42  # Random seed for reproducibility

agent:
  class: C2RL
  base_algorithm: "PPO"  # The underlying foundational RL algorithm (e.g., PPO, SAC)
  # PPO shared config
  rollouts: 300  # Number of environment steps per parallel environment per update
  learning_epochs: 5  # Number of gradient descent passes over the collected batch
  mini_batches: 4  # Number of subsets to divide the batch into for stochastic optimization
  gae_lambda: 0.95  # Lambda parameter for Generalized Advantage Estimation (GAE)
  learning_rate: 3.0e-4  # Global step size for neural network optimization
  ratio_clip: 0.2  # PPO trust region clipping bound for the objective ratio
  value_clip: 0.2  # Clipping bound for the value function update
  entropy_loss_scale: 0.0  # Coefficient to encourage exploration by maximizing action entropy
  value_loss_scale: 1.0  # Weight coefficient for the value function loss term
  kl_threshold: 0.0  # Early stopping threshold based on Kullback-Leibler divergence
  grad_norm_clip: 1.0  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  # C2RL-specific
  gamma_contracting: 0.0  # Blending weight for the contraction metric reward component
  gamma_optimal: 0.99  # Blending weight for the optimal task reward component
  con_only: false  # If true, the agent trains exclusively on the contraction reward
  # CMG
  W_lr: 3.0e-4
  w_ub: 10.0
  w_lb: 0.1
  lbd: 0.01
  eps: 0.01
  W_entropy_scaler: 1.0e-3
  cmg_updates_per_iter: 3
  cmg_minibatch_size: 1024
  buffer_size: 2048
  # reward normalisation
  reward_norm_beta: 0.99  # Moving average momentum for reward normalization
  tracking_scaler: 1.0  # Weight applied to the tracking error reward component
  control_scaler: 0.0  # Weight applied to the control effort penalty component
  # model architecture
  hidden_dim: [128, 128]  # General hidden layer dimensions for internal networks
  cmg_hidden_dim: [128, 128]  # Hidden layer dimensions for the Contraction Metric Generator
  experiment:
    directory: "segway_c2rl"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name: ~  # auto-generated by train.py (deterministic, matches local log dir)

trainer:
  class: C2RLSkrlTrainer
  timesteps: 600000  # Total number of environment steps to train for
  rollouts: 300  # Number of environment steps per parallel environment per update
  con_only: false  # If true, the agent trains exclusively on the contraction reward
