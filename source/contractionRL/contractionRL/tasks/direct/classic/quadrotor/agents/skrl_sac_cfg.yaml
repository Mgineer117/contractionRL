seed: 42
models:
  separate: true
  policy:
    class: GaussianMixin
    backbone: control-squashed  # tanh-squashed CLActor — SAC needs a bounded action distribution (unbounded control/contraction has no entropy fixed point → diverges); see models.py SquashedCLActorModel
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    network:
    - name: net
      input: OBSERVATIONS
      layers: [256, 256]
      activations: relu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
  critic_2:
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
memory:
  class: RandomMemory
  memory_size: 100000
agent:
  class: SAC
  gradient_steps: 1
  batch_size: 256
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: 0.0003
  learn_entropy: true
  initial_entropy_value: 0.2
  random_timesteps: 1000
  learning_starts: 1000
  grad_norm_clip: 1.0
  experiment:
    directory: quadrotor_sac
    experiment_name: ''
    write_interval: auto
    checkpoint_interval: auto
    wandb: true
    wandb_kwargs:
      project: contractionRL
      name:    # auto-generated by train.py (deterministic, matches local log dir)
  use_state_norm: false
trainer:
  class: SequentialTrainer
  timesteps: 600000
  environment_info: log
