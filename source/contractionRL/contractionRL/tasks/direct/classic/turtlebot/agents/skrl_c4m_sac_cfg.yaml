seed: 42  # Random seed for reproducibility

models:
  separate: true
  c3m_policy:  # throwaway controller used ONLY to help synthesize the CMG offline (Phase A) — discarded once frozen
    class: DeterministicMixin
    backbone: contraction
    clip_actions: false
    network:
    - name: net
      input: OBSERVATIONS
      layers: [128, 128]
      activations: tanh
  cmg:
    class: CMG
    network:
    - name: net
      input: OBSERVATIONS
      layers: [128, 128]
      activations: tanh
      constrain_eigenvalues: true
  dynamics:
    class: NeuralDynamics
    network:
    - name: net
      input: STATE_ACTION
      layers: [128, 128]
      activations: relu
  policy:  # the REAL deployed policy (Phase B) — trains against the frozen CMG's Mahalanobis reward
    class: GaussianMixin
    backbone: control-squashed  # SAC requires a tanh-squashed backbone (unbounded log_prob diverges)
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    network:
    - name: net
      input: OBSERVATIONS
      layers: [128, 128]
      activations: tanh
    output: ACTIONS
  critic:  # architecture shared by SAC's critic_1/critic_2 + their target networks
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE

memory:
  class: RandomMemory
  memory_size: 100000  # Phase B's SAC replay buffer size (rows); total capacity = memory_size * num_envs.
                        # PERSISTENT across training (this is what keeps C4M-SAC off-policy, like standalone SAC).

agent:
  class: C4M-SAC
  # ── Phase A: offline CMG synthesis (exactly like standalone C3M) ──────── #
  c3m_epochs: 100  # number of C3MAgent.update() epoch-passes over the offline buffer
  c3m_batch_size: 1024
  c3m_learning_rate_scheduler: "ExponentialLR"
  c3m_learning_rate_scheduler_kwargs:
    gamma: 0.9999
  policy_update_per_cmg_update: 1  # Number of CMG metric updates per c3m_policy update (Phase A only)
  W_lr: 3.0e-4
  u_lr: 3.0e-4
  lbd: 0.5
  eps: 0.01
  w_ub: 10.0
  w_lb: 0.1
  detach_warmup_frac: 0.0
  # Classic env: use analytical dynamics (no NeuralDynamics training needed) for Phase A.
  # Pass --use_empirical_dynamics to train a NeuralDynamics instead.
  use_empirical_dynamics: false  # false = env's analytical get_f_and_B; true = learn NeuralDynamics

  # ── Phase B: deployed SAC policy against the frozen CMG ────────────────── #
  # Standard robotics SAC defaults (see skrl_sac_cfg.yaml across this repo).
  gradient_steps: 1
  batch_size: 1024
  polyak: 0.005
  learning_rate: 3.0e-4  # shared by policy, critic, and entropy coefficient
  learn_entropy: true
  initial_entropy_value: 0.2
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  use_state_norm: false  # OFF by default — see c2rl.py's module docstring (residual-uref distortion)
  discount_factor: 0.99  # deployed policy's discount factor (no con/opt duality here — the CMG is
                         # already frozen by the time Phase B starts)

  # ── Mahalanobis reward (Phase B, against the frozen metric) ────────────── #
  tracking_scaler: 1.0  # Q: tracking-error weight
  control_scaler: 0.0  # R: control-effort weight (0 = disabled)

  experiment:
    directory: "turtlebot_c4m_sac"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name:    # auto-generated by train.py (deterministic, matches local log dir)

trainer:
  class: C4MSkrlTrainer
  timesteps: 30000  # Phase B (deployed-policy) total environment steps to train for
