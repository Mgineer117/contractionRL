seed: 42  # Random seed for reproducibility

models:
  separate: true
  # The single deployed policy C2RL trains, on the Mahalanobis reward.
  policy:
    class: GaussianMixin
    backbone: control-squashed  # SAC requires a tanh-squashed backbone (unbounded log_prob diverges)
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    network:
    - name: net
      input: OBSERVATIONS
      layers: [128, 128]
      activations: tanh
    output: ACTIONS
    initial_log_std: 0.0
  critic:  # architecture shared by SAC's critic_1/critic_2 + their target networks
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
  # NeuralDynamics (ẋ = f(x) + B(x)·u) — feeds the online contraction-metric SDP
  # when learning dynamics. Built only when use_empirical_dynamics=true (pass
  # --use_empirical_dynamics); classic envs default to analytical get_f_and_B.
  dynamics:
    class: NeuralDynamics
    network:
    - name: net
      input: STATE_ACTION
      layers: [128, 128]
      activations: relu
  # A `cmg` (class: CMG) model is always built (see c2rl.py module docstring) —
  # omitted here so ContractionRunner falls back to its default [256, 256]/tanh
  # architecture; add a `cmg:` block above (like classic/car's) to customize it.

memory:
  class: RandomMemory
  memory_size: 100000  # SAC persistent replay buffer (rows); total capacity = memory_size * num_envs

agent:
  class: C2RL-SAC
  # SAC shared config (the single deployed policy's SAC sub-agent).
  gradient_steps: 1
  batch_size: 1024
  polyak: 0.005
  learning_rate: 3.0e-4  # shared by policy, critic, and entropy coefficient
  learn_entropy: true
  initial_entropy_value: 0.2
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  use_state_norm: false  # OFF by default — see c2rl.py module docstring / rl_glue.make_base_rl_cfg
  discount_factor: 0.99  # deployed policy's discount factor (single policy — no con/opt duality)
  # NOTE: the contraction-metric / Mahalanobis-reward config (cmg_method, w_ub,
  # w_lb, lbd, tracking_scaler, control_scaler, cm_eps, cm_solver) lives in the
  # top-level `cm:` block below; the offline CMG synthesis (Phase A, always
  # runs) additionally reads `cmg:`.
  experiment:
    directory: "turtlebot_c2rl_sac"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name:    # auto-generated by train.py (deterministic, matches local log dir)

# ── Contraction metric + Mahalanobis reward ────────────────────────────────── #
cm:
  # Mahalanobis reward
  w_ub: 10.0  # Upper eigenvalue bound for the metric M(x)
  w_lb: 0.1   # Lower eigenvalue bound for the metric M(x)
  lbd: 0.5    # Contraction rate λ — used by cmg_method's synthesis loss (default "ccm": CMG C1 loss)
  tracking_scaler: 1.0  # Q: tracking-error weight
  control_scaler: 0.0   # R: control-effort weight (0 = disabled)
  # SDP contraction metric ("cvstem" method only — cmg_method below defaults to
  # "ccm", which uses neither this LMI nor a Riccati penalty).
  cm_eps: 0.01  # Strict-definiteness margin on the contraction LMI
  cm_solver: MOSEK  # cvxpy SDP solver: SCS (default, no license) | CLARABEL (no license, tighter/slower) | MOSEK (commercial license, tightest/fastest — see README.md Installation)

# ── Offline CMG synthesis (Phase A, always runs before Phase B) ───────────── #
cmg:
  cmg_regress_lr_scheduler: "StepLR"  # built the same way as empirical_dynamics' scheduler
  cmg_regress_lr_scheduler_kwargs:
    step_size: 1  # anneal every epoch
    gamma: 0.99

# ── Dynamics — analytical env get_f_and_B by default; set use_empirical_dynamics
#    true (classic envs only) to learn a NeuralDynamics instead. ─────────────── #
empirical_dynamics:
  use_empirical_dynamics: false  # false = env analytical get_f_and_B; true = learn NeuralDynamics
  # States×controls for ONLINE dynamics-data generation (use_empirical_dynamics=true
  # with no dynamics_pretrain_data_path): samples ceil(memory_size / N) states and
  # pairs each with N distinct controls → N control-aware samples per state. Only
  # affects NeuralDynamics pretraining; ignored under analytical dynamics. Default 3.
  num_controls_per_state: 3
  dynamics_lr: 1.0e-3
  dynamics_lr_scheduler: "StepLR"
  dynamics_lr_scheduler_kwargs:
    step_size: 1  # anneal every epoch
    gamma: 0.99
  dynamics_batch_size: 4096
  dynamics_pretrain_epochs: 200  # offline-data epochs, or online rollouts when no data path

trainer:
  class: C2RLSkrlTrainer
  timesteps: 30000   # Total number of environment steps to train for
