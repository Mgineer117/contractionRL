seed: 42  # Random seed for reproducibility

models:
  separate: true
  policy:
    class: GaussianMixin  # Uses a Gaussian distribution for continuous actions
    backbone: control  # mlp (plain MLP, u = uref + MLP(obs)) | control (CLActor, u = uref + feedback(x-xref))
    clip_actions: false  # Clip actions to the environment action space limits
    clip_log_std: true  # Clip the log standard deviation of the policy distribution
    min_log_std: -20.0  # Lower bound for log standard deviation
    max_log_std: 2.0  # Upper bound for log standard deviation
    initial_log_std: 0.0
    network:
    - name: net
      input: OBSERVATIONS
      layers:
      - 128
      - 128
      activations: tanh
    output: ACTIONS
  value:
    class: DeterministicMixin  # Outputs deterministic continuous values
    network:
    - name: net
      input: OBSERVATIONS
      layers:
      - 128
      - 128
      activations: tanh
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1  # Capacity of the experience replay buffer (-1 means dynamic/infinite)

agent:
  class: PPO
  rollouts: 4         # Number of environment steps per parallel environment per update
  learning_epochs: 5  # Number of gradient descent passes over the collected batch
  mini_batches: 4  # Number of subsets to divide the batch into for stochastic optimization
  discount_factor: 0.01  # Gamma discount factor weighting future rewards
  gae_lambda: 0.99  # Lambda parameter for Generalized Advantage Estimation (GAE)
  learning_rate: 1.0e-6    # Global step size for neural network optimization
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.02
  kl_threshold: 0.02 # Early stopping threshold based on Kullback-Leibler divergence
  std_dev_annealing_kwargs:
    schedule: exponential
    final_log_std: -4.6
    power: 5.0
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  ratio_clip: 0.3  # PPO trust region clipping bound for the objective ratio
  value_clip: 0.0  # Clipping bound for the value function update
  entropy_loss_scale: 0.0
  value_loss_scale: 0.5  # Weight coefficient for the value function loss term
  
  # ── CAPS action smoothness (Mysore et al. 2021) ─────────────────────────── #
  # Added to the POLICY LOSS, not the reward, so the MDP / observation layout /
  # dynamics are all untouched. Temporal term only by default: the spatial term
  # buys robustness to state noise and model error, which the analytically
  # modeled classic envs do not have. Both 0.0 = off, at which the patch no-ops
  # entirely (no hooks, no extra memory tensors). Override per-run with
  # --caps_temporal_scale / --caps_spatial_scale / --caps_spatial_std.
  # See agent_patches.patch_caps_regularizer.
  caps_temporal_scale: 0.0   # weight on ||pi(s_t) - pi(s_t+1)||^2
  caps_spatial_scale: 0.0    # weight on ||pi(s) - pi(s_bar)||^2, s_bar ~ N(s, sigma^2)
  caps_spatial_std: 0.05     # sigma, in RAW observation units; inert while the scale is 0.0

  experiment:
    directory: "car_ppo"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name:    # auto-generated by train.py (deterministic, matches local log dir)

  
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: true
  use_state_norm: false
  use_value_norm: true
trainer:
  class: SequentialTrainer
  timesteps: 50000   # Total number of environment steps to train for
  environment_info: log  # Type of environment information to record (e.g., log)
