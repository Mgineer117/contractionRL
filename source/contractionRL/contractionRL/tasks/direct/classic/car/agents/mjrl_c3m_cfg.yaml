seed: 42

agent:
  class: C3M
  device: cuda         # falls back to cpu automatically if unavailable
  W_lr: 3.0e-4
  u_lr: 3.0e-4
  lbd: 0.5
  eps: 1.0e-2
  w_ub: 10.0
  w_lb: 0.01
  num_minibatch: 8
  minibatch_size: 256
  cmg_updates_per_policy_update: 1
  buffer_size: 65536
  cmg:
    hidden_dim: [128, 128]
    activation: tanh
    mode: deterministic
  actor:
    hidden_dim: [128, 128]
    activation: tanh

trainer:
  class: C3MTrainer
  num_agent: 4         # == num_worker for the parallel eval sampler
  epochs: 30000
  eval_interval: 2000
  log_interval: 200
