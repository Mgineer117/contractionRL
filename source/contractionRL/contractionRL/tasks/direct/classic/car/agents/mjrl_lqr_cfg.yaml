seed: 42  # Random seed for reproducibility

agent:
  class: LQR
  batch_size: 2048
  minibatch_size: 2048
  use_state_norm: false  # not applicable for analytical LQR
  device: cpu          # LQR solves a CARE per state on CPU (scipy)
  Q_scaler: 1.0
  R_scaler: 1.0          # nonzero control cost — R=0 gives unstable (huge) gains under discrete dt

trainer:
  class: EvalTrainer
  num_agent: 4         # == num_worker for the parallel rollout sampler
  num_eval_rounds: 1
