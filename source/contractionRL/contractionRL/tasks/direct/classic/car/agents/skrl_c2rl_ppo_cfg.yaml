seed: 42  # Random seed for reproducibility

models:
  separate: true
  # The single deployed policy C2RL trains, on the Mahalanobis reward.
  policy:
    class: GaussianMixin
    backbone: control  # PPO is unbounded; uref+feedback can exceed the declared action space
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    network:
    - name: net
      input: OBSERVATIONS
      layers: [128, 128]
      activations: tanh
    output: ACTIONS
    initial_log_std: 0.0
  critic:  # PPO value function V(obs)
    class: DeterministicMixin
    network:
    - name: net
      input: OBSERVATIONS
      layers: [128, 128]
      activations: tanh
    output: ONE
  # NeuralDynamics (ẋ = f(x) + B(x)·u) — feeds the online contraction-metric SDP
  # when learning dynamics. Built only when use_empirical_dynamics=true (pass
  # --use_empirical_dynamics); classic envs default to analytical get_f_and_B.
  dynamics:
    class: NeuralDynamics
    network:
    - name: net
      input: STATE_ACTION
      layers: [128, 128]
      activations: relu
  # use_cmg=true (below): the CMG network gets REGRESSED onto the per-state SDP
  # solutions (build_cm_dataset + regress_cmg) and frozen before RL.
  cmg:
    class: CMG
    network:
    - name: net
      input: OBSERVATIONS
      layers: [128, 128]
      activations: tanh
      constrain_eigenvalues: true

memory:
  class: RandomMemory
  memory_size: -1  # PPO: one rollout epoch, reset each epoch (== agent.rollouts)

agent:
  class: C2RL-PPO
  # PPO shared config (the single deployed policy's PPO sub-agent).
  rollouts: 24   # Number of environment steps per parallel environment per update
  learning_epochs: 5  # Number of gradient descent passes over the collected batch
  mini_batches: 4  # Number of subsets to divide the batch into for stochastic optimization
  gae_lambda: 0.95  # Lambda parameter for Generalized Advantage Estimation (GAE)
  learning_rate: 1.0e-6   # Global step size for neural network optimization
  learning_rate_scheduler: KLAdaptiveLR # matches the standalone PPO baseline for this env
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  std_dev_annealing_kwargs:
    schedule: exponential
    final_log_std: -4.6
    power: 5.0
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  ratio_clip: 0.2  # PPO trust region clipping bound for the objective ratio
  value_clip: 0.0  # Clipping bound for the value function update
  entropy_loss_scale: 0.001 # Coefficient to encourage exploration by maximizing action entropy
  value_loss_scale: 0.5  # Weight coefficient for the value function loss term
  kl_threshold: 0.02 # Early stopping threshold based on Kullback-Leibler divergence
  time_limit_bootstrap: true  # Bootstrap value at episode truncation instead of treating it as terminal
  rewards_shaper_scale: 1.0
  use_state_norm: false  # OFF by default — see c2rl.py module docstring / rl_glue.make_base_rl_cfg
  use_value_norm: true   # Same, but for the value function's output (PPO only)
  discount_factor: 0.1  # deployed policy's discount factor (single policy — no con/opt duality)
  # NOTE: the contraction-metric / Mahalanobis-reward config (use_cmg, w_ub,
  # w_lb, lbd, tracking_scaler, control_scaler, cm_eps, cm_solver) lives in the
  # top-level `cm:` block below; use_cmg=true additionally reads `cmg:`;
  # use_empirical_dynamics reads `empirical_dynamics:`.
  experiment:
    directory: "car_c2rl_ppo"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name:    # auto-generated by train.py (deterministic, matches local log dir)

# ── Contraction metric + Mahalanobis reward (both use_cmg modes) ──────────── #
cm:
  use_cmg: true  # false = online contraction-metric (CM) SDP solved per state (no metric
                  #         network, needs cvxpy);
                  # true  = offline-synthesized CMG network, frozen before training (Phase A below)
  # Mahalanobis reward
  w_ub: 10.0  # Upper eigenvalue bound for the metric M(x)
  w_lb: 0.1   # Lower eigenvalue bound for the metric M(x)
  lbd: 0.5    # Contraction rate λ (shared: CM SDP LMI when use_cmg=false, CMG Cu/C1 loss when true)
  tracking_scaler: 1.0  # Q: tracking-error weight
  control_scaler: 0.0   # R: control-effort weight (0 = disabled)
  # SDP contraction metric (shared by both modes)
  cm_eps: 0.01  # Strict-definiteness margin on the contraction LMI
  cm_solver: MOSEK  # cvxpy SDP solver: SCS (default, no license) | CLARABEL (no license, tighter/slower) | MOSEK (commercial license, tightest/fastest — see README.md Installation)
  # Which pointwise SDP is solved for W(x) (both drop the Ẇ material-derivative
  # term for pointwise-SDP tractability — see cm_synthesis.py module docstring):
  #   "ccm"    (default) — Manchester-style: eliminate B via the annihilator
  #             B_null, existence-only certificate that SOME controller
  #             contracts under W (no B, no controller construction):
  #               B_nullᵀ (Aᶠ·W + W·Aᶠᵀ + 2λ·W) B_null ⪯ -ε·I
  #               w_lb·I ⪯ W ⪯ w_ub·I
  #   "cvstem" — Tsukamoto CV-STEM-style: keep B directly via a Riccati term
  #              instead of eliminating it (R = cvstem_r_scaler·I below), the
  #              same congruence trick (W = M⁻¹) that convexifies the Riccati
  #              inequality — M(x) doubles as a state-dependent-Riccati
  #              solution, so K(x) = R⁻¹B(x)ᵀM(x) is a ready LQR-style gain
  #              (not wired up here — C2RL only consumes M for the reward):
  #               Aᶠ·W + W·Aᶠᵀ - (1/R)·B·Bᵀ + 2λ·W ⪯ -ε·I
  #               w_lb·I ⪯ W ⪯ w_ub·I
  cm_formulation: ccm
  cvstem_r_scaler: 1.0  # R = cvstem_r_scaler·I in the BR⁻¹Bᵀ term (mirrors skrl_sdlqr_cfg.yaml's R_scaler); "cvstem" only
  # On SDP infeasibility AT A GIVEN STATE, retry that state alone with λ
  # halved, up to this many times, before giving up on it and (offline)
  # dropping it from the dataset / (online) falling back to M=I for that
  # state — 0 disables this and reverts to dropping/falling-back immediately.
  # Warns per reduced state + an aggregate summary offline (build_cm_dataset);
  # warns once per process online (compute_cm_reward_online), since that path
  # runs every training step. See cm_synthesis._solve_cm_metric_with_backoff.
  max_lambda_reductions: 5
  min_feasibility_rate: 0.5  # raise before CMG regression if fewer than 50% of sampled states are feasible
  # Cache the synthesized {x, W} CM dataset here (build_cm_dataset's per-state SDP
  # solve is the expensive part of use_cmg=true synthesis — 131072 states can take
  # minutes). The actual filename written/read is this path with "_<cm_formulation>"
  # inserted before .npz (e.g. cm_data_cvstem.npz) — see
  # cm_synthesis.with_formulation_suffix — so "ccm" and "cvstem" runs get separate
  # cache files here and can never clobber or silently reuse each other's solve.
  # Reused on a later run as long as lbd/w_lb/w_ub/cm_eps/cm_solver/cvstem_r_scaler/
  # cmg_memory_size below all still match too; re-solved and overwritten otherwise.
  cm_data_path: "logs/classic/car/cm_data.npz"

# ── use_cmg=true: offline SDP-dataset + CMG-network regression ────────────── #
# Sample cmg_memory_size states (uniformly from the classic env's analytic
# state space, or from empirical_dynamics.dynamics_pretrain_data_path when
# set), solve one SDP per state, then MSE-regress the models.cmg network onto
# {x -> W*} and freeze it. Only read when agent.use_cmg=true.
cmg:
  cmg_memory_size: 131072
  cmg_regress_epochs: 200
  cmg_regress_lr: 1.0e-3
  cmg_regress_lr_scheduler: ""  # e.g. "StepLR" — built the same way as empirical_dynamics' scheduler
  cmg_regress_lr_scheduler_kwargs: {}
  cmg_regress_batch_size: 1024

# ── Dynamics — analytical env get_f_and_B by default; set use_empirical_dynamics
#    true (classic envs only) to learn a NeuralDynamics instead. ─────────────── #
empirical_dynamics:
  use_empirical_dynamics: false  # false = env analytical get_f_and_B; true = learn NeuralDynamics
  dynamics_lr: 1.0e-3
  dynamics_lr_scheduler: "StepLR"
  dynamics_lr_scheduler_kwargs:
    step_size: 1  # anneal every epoch
    gamma: 0.99
  dynamics_batch_size: 4096
  dynamics_pretrain_epochs: 200  # offline-data epochs, or online rollouts when no data path

trainer:
  class: C2RLSkrlTrainer
  timesteps: 10000   # Total number of environment steps to train for
