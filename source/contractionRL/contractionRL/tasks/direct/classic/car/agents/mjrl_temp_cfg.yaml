seed: 42

agent:
  class: TEMP
  optimal_policy: ppo   # ppo | sac
  actor_type: CL        # CL (contracting weight-matrix actor) | RL (standard MLP)
  con_only: false       # true → skip optimal policy (only train contracting + CMG)
  anneal_stddev: true   # anneal log_std of the RL backbone 0 → -20
  gamma_contracting: 0.0
  gamma_optimal: 0.99
  # shared PPO hyperparams for both con + opt policies
  actor_lr: 3.0e-4
  critic_lr: 5.0e-4
  eps_clip: 0.2
  target_kl: 0.03
  gae: 0.95
  hidden_dim: [256, 256]
  # CMG
  cmg:
    hidden_dim: [128, 128]
    activation: tanh
    mode: deterministic
  W_lr: 3.0e-4
  lbd: 1.0e-2
  eps: 1.0e-2
  w_ub: 10.0
  w_lb: 0.01
  cmg_updates_per_iter: 5
  buffer_size: 65536   # rollout buffer for CMG training data

trainer:
  class: TEMPTrainer
  optimal_policy: ppo
  num_agent: 4
  epochs: 2000
  eval_interval: 200
  log_interval: 20
  cmg_updates_per_iter: 5
