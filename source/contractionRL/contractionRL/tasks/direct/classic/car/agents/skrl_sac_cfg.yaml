seed: 42

models:
  separate: True
  policy:
    class: GaussianMixin
    backbone: mlp
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: relu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    clip_actions: True
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: relu
    output: ONE
  critic_2:
    class: DeterministicMixin
    clip_actions: True
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: relu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: True
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: relu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: True
    network:
      - name: net
        input: "concatenate([OBSERVATIONS, ACTIONS])"
        layers: [128, 128]
        activations: relu
    output: ONE

memory:
  class: RandomMemory
  memory_size: 250000  # total buffer (single-env mode buffers per env; with 4 envs: 250K/4≈62K each)

agent:
  class: SAC
  gradient_steps: 1
  batch_size: 256
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: 3.0e-04
  learn_entropy: True
  initial_entropy_value: 0.2
  random_timesteps: 1000
  learning_starts: 1000
  grad_norm_clip: 1.0
  experiment:
    directory: "car_sac"
    experiment_name: ""
    write_interval: 10
    checkpoint_interval: 10

trainer:
  class: SequentialTrainer
  timesteps: 600000
  environment_info: log
