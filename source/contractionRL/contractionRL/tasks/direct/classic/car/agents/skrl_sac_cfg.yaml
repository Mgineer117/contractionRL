seed: 42
models:
  separate: true
  policy:
    class: GaussianMixin
    backbone: control-squashed  # tanh-squashed CLActor — SAC needs a bounded action distribution (unbounded control/contraction has no entropy fixed point → diverges); see models.py SquashedCLActorModel
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    network:
    - name: net
      input: OBSERVATIONS
      layers: [256, 256]
      activations: relu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
  critic_2:
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers: [256, 256]
      activations: relu
    output: ONE
memory:
  class: RandomMemory
  memory_size: 100000
agent:
  class: SAC
  gradient_steps: 1
  batch_size: 256
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: 0.0003
  learn_entropy: true
  initial_entropy_value: 0.2
  random_timesteps: 1000
  learning_starts: 1000
  grad_norm_clip: 1.0
  # ── CAPS action smoothness (Mysore et al. 2021) ─────────────────────────── #
  # Added to the POLICY LOSS, not the reward, so the MDP / observation layout /
  # dynamics are all untouched. Temporal term only by default: the spatial term
  # buys robustness to state noise and model error, which the analytically
  # modeled classic envs do not have. Both 0.0 = off, at which the patch no-ops
  # entirely (no hooks, no extra memory tensors). Override per-run with
  # --caps_temporal_scale / --caps_spatial_scale / --caps_spatial_std.
  # See agent_patches.patch_caps_regularizer.
  caps_temporal_scale: 0.0   # weight on ||pi(s_t) - pi(s_t+1)||^2
  caps_spatial_scale: 0.0    # weight on ||pi(s) - pi(s_bar)||^2, s_bar ~ N(s, sigma^2)
  caps_spatial_std: 0.05     # sigma, in RAW observation units; inert while the scale is 0.0

  experiment:
    directory: car_sac
    experiment_name: ''
    write_interval: auto
    checkpoint_interval: auto
    wandb: true
    wandb_kwargs:
      project: contractionRL
      name:    # auto-generated by train.py (deterministic, matches local log dir)
  use_state_norm: false
trainer:
  class: SequentialTrainer
  timesteps: 30000
  environment_info: log
