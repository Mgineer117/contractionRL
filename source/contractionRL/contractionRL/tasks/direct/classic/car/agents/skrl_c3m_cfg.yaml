seed: 42

models:
  # separate flag is not functionally used for C3M but is present for code compatibility with SKRL internals
  separate: True
  policy:
    class: DeterministicMixin
    backbone: contraction
    clip_actions: True
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: tanh
  cmg:
    class: CMG
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: tanh
  dynamics:
    class: NeuralDynamics
    network:
      - name: net
        input: STATE_ACTION
        layers: [128, 128]
        activations: relu

agent:
  class: C3M
  batch_size: 2048  # Number of samples to collect from the environment before performing an update
  num_minibatch: 8  # Number of minibatches to split the collected batch into
  minibatch_size: 512  # Size of each minibatch for gradient descent updates
  learning_rate_scheduler: null  # Optional PyTorch learning rate scheduler (e.g., "StepLR")
  cmg_updates_per_policy_update: 3  # Number of CMG metric updates to perform per policy update
  W_lr: 3.0e-4  # Learning rate for the Contraction Metric Generator (CMG) network
  u_lr: 3.0e-4  # Learning rate for the Policy (Actor) network
  lbd: 0.01  # Contraction rate parameter (lambda) enforcing the exponential stability bound
  eps: 0.01  # Margin parameter (epsilon) ensuring strict definiteness of the metric
  w_ub: 10.0  # Upper bound clipping value for the generated metric M(x)
  w_lb: 0.1  # Lower bound clipping value for the generated metric M(x)
  # Classic env: use analytical dynamics (no NeuralDynamics training needed).
  # Override with --use_analytical_dynamics=false to train NeuralDynamics anyway.
  use_analytical_dynamics: true  # Whether to use exact analytical dynamics (true) or learn NeuralDynamics (false)
  experiment:
    directory: "car_c3m"
    experiment_name: ""
    write_interval: 300
    checkpoint_interval: 300

trainer:
  class: C3MTrainer
  timesteps: 30000
  eval_interval: 1000
  environment_info: log
