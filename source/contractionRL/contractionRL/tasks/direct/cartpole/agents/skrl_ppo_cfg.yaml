seed: 42
models:
  separate: true
  policy:
    class: GaussianMixin
    backbone: mlp
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [32, 32]
        activations: tanh
    output: ACTIONS
  value:
    class: DeterministicMixin
    network:
      - name: net
        input: OBSERVATIONS
        layers: [32, 32]
        activations: tanh
    output: ONE
memory:
  class: RandomMemory
  memory_size: -1
agent:
  class: PPO
  rollouts: 32
  learning_epochs: 8
  mini_batches: 8
  discount_factor: 0.99
  gae_lambda: 0.97
  learning_rate: 0.0003
  learning_rate_scheduler:
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5
  ratio_clip: 0.2
  value_clip: 0.0
  entropy_loss_scale: 0.01
  value_loss_scale: 2.0
  kl_threshold: 0.03
  time_limit_bootstrap: false
  experiment:
    directory: cartpole_direct
    experiment_name: ''
    write_interval: auto
    checkpoint_interval: auto
    wandb: true
    wandb_kwargs:
      project: contractionRL
      name: ~  # auto-generated by train.py (deterministic, matches local log dir)
trainer:
  class: SequentialTrainer
  timesteps: 4800
  environment_info: log
