seed: 42  # Random seed for reproducibility


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:  # see gaussian_model parameters
    class: GaussianMixin  # Uses a Gaussian distribution for continuous actions
    backbone: mlp
    clip_actions: True  # Clip actions to the environment action space limits
    clip_log_std: True  # Clip the log standard deviation of the policy distribution
    min_log_std: -20.0  # Lower bound for log standard deviation
    max_log_std: 2.0  # Upper bound for log standard deviation
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [32, 32]
        activations: tanh
    output: ACTIONS
  value:  # see deterministic_model parameters
    class: DeterministicMixin  # Outputs deterministic continuous values
    clip_actions: True  # Clip actions to the environment action space limits
    network:
      - name: net
        input: OBSERVATIONS
        layers: [32, 32]
        activations: tanh
    output: ONE


# Rollout memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1  # automatically determined (same as agent:rollouts)


# PPO agent configuration (field names are from PPO_DEFAULT_CONFIG)
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPO
  rollouts: 32  # Number of environment steps per parallel environment per update
  learning_epochs: 8  # Number of gradient descent passes over the collected batch
  mini_batches: 8  # Number of subsets to divide the batch into for stochastic optimization
  discount_factor: 0.99  # Gamma discount factor weighting future rewards
  gae_lambda: 0.97  # Lambda parameter for Generalized Advantage Estimation (GAE)
  learning_rate: 3.0e-04  # Global step size for neural network optimization
  learning_rate_scheduler: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5  # Maximum permitted magnitude for gradients (prevents exploding gradients)
  ratio_clip: 0.2  # PPO trust region clipping bound for the objective ratio
  value_clip: 0.0  # Clipping bound for the value function update
  entropy_loss_scale: 0.0  # Coefficient to encourage exploration by maximizing action entropy
  value_loss_scale: 2.0  # Weight coefficient for the value function loss term
  kl_threshold: 0.03  # Early stopping threshold based on Kullback-Leibler divergence
  time_limit_bootstrap: False  # Bootstrap value estimates when episodes end due to time limits
  # logging and checkpoint
  experiment:
    directory: "cartpole_direct"
    experiment_name: ""
    write_interval: "auto"  # Logging frequency for tensorboard/W&B (in epochs/steps)
    checkpoint_interval: "auto"  # Frequency of saving model weights (in epochs/steps)
    wandb: true  # Enable Weights & Biases logging
    wandb_kwargs:
      project: contractionRL
      name: ~  # auto-generated by train.py (deterministic, matches local log dir)


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 4800  # Total number of environment steps to train for
  environment_info: log  # Type of environment information to record (e.g., log)
