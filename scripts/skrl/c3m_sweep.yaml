program: scripts/skrl/train.py
method: bayes
metric:
  name: "Reward / Total reward (mean)"
  goal: maximize

parameters:
  agent.learning_rate:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3
  agent.entropy_loss_scale:
    distribution: uniform
    min: 0.0
    max: 0.01
  agent.rollouts:
    values: [16, 32, 64]
  agent.mini_batches:
    values: [2, 4, 8]
  agent.learning_epochs:
    values: [3, 5, 10]

command:
  - ${env}
  - python
  - ${program}
  - "--classic"
  - "--task"
  - "Car-v0"
  - "--algorithm"
  - "c3m"
  - "--num_envs"
  - "4"
  - ${args}
