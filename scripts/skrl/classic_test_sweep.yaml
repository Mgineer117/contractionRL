program: scripts/skrl/train.py
method: random
metric:
  name: "Reward / Total reward (mean)"
  goal: maximize

parameters:
  agent.learning_rate:
    values: [1e-4, 5e-4]

command:
  - ${env}
  - python
  - ${program}
  - "--classic"
  - "--task"
  - "Car-v0"
  - "--algorithm"
  - "c3m"
  - "--epochs"
  - "1"
  - ${args}
